name: Lint Claim References

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'scripts/lint_claims.py'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'scripts/lint_claims.py'

jobs:
  lint-claims:
    runs-on: ubuntu-latest
    name: Validate claim references

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run claim linting
        run: python scripts/lint_claims.py
        working-directory: ${{ github.workspace }}

      - name: Comment PR with results (if errors)
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Claim reference validation failed. Run `python scripts/lint_claims.py` locally to see details.'
            })
