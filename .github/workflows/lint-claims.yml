name: Lint Claim References

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'scripts/ci_check_docs.py'
      - 'scripts/lint_report.py'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'scripts/ci_check_docs.py'
      - 'scripts/lint_report.py'

jobs:
  lint-claims:
    runs-on: ubuntu-latest
    name: Validate claim references

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Advisory referential check against the PUBLISHED docs tree. The
      # canonical linter (lint_report.py) runs against the raw workspace, which
      # isn't in this repo, so CI uses the docs-based subset. continue-on-error
      # keeps this advisory: it surfaces broken references in the log without
      # blocking the merge or the GitHub Pages deploy.
      - name: Check claim references (advisory)
        id: refcheck
        continue-on-error: true
        run: python scripts/ci_check_docs.py
        working-directory: ${{ github.workspace }}

      - name: Comment PR with results (if references unresolved)
        if: steps.refcheck.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Advisory: some claim references are unresolved. Run `python scripts/ci_check_docs.py` locally for details. This does not block merge or deploy.'
            })
